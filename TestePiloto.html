<script>

const cameraType = document.getElementById("cameraType");
const dvrSettings = document.getElementById("dvrSettings");
const domeSettings = document.getElementById("domeSettings");
const dvrUnit = document.getElementById("dvrUnit");
const dvrCamera = document.getElementById("dvrCamera");
const domeUnit = document.getElementById("domeUnit");
const funcionando = document.getElementById("funcionando");
const imagem = document.getElementById("imagem");
const gravando = document.getElementById("gravando");
const detalhado = document.getElementById("detalhado");
const criticidade = document.getElementById("criticidade");
const foto = document.getElementById("foto");

function avaliarChecklist() {

    if (funcionando.value === "sim" && imagem.value === "sim" && gravando.value === "sim") {
        detalhado.style.display = "none";
        criticidade.value = "🟢 OK";
    } else {
        detalhado.style.display = "block";

        if (gravando.value === "nao") {
            criticidade.value = "🔴 Crítico";
        } else if (imagem.value === "nao") {
            criticidade.value = "🟠 Alto";
        } else {
            criticidade.value = "🟡 Médio";
        }
    }
}

function atualizarCameraSettings() {
    if (cameraType.value === "dvr") {
        dvrSettings.style.display = "grid";
        domeSettings.style.display = "none";
    } else if (cameraType.value === "dome") {
        dvrSettings.style.display = "none";
        domeSettings.style.display = "grid";
    } else {
        dvrSettings.style.display = "none";
        domeSettings.style.display = "none";
    }
    atualizarCameraId();
}

function atualizarCameraId() {
    let cameraId = "";
    if (cameraType.value === "dvr" && dvrUnit.value && dvrCamera.value) {
        cameraId = `DVR ${dvrUnit.value} - Câmera ${dvrCamera.value}`;
    } else if (cameraType.value === "dome" && domeUnit.value) {
        cameraId = `Dome ${domeUnit.value}`;
    }
    document.getElementById("cameraId").value = cameraId;
}

funcionando.addEventListener("change", avaliarChecklist);
imagem.addEventListener("change", avaliarChecklist);
gravando.addEventListener("change", avaliarChecklist);

cameraType.addEventListener("change", atualizarCameraSettings);
dvrUnit.addEventListener("change", atualizarCameraId);
dvrCamera.addEventListener("change", atualizarCameraId);
domeUnit.addEventListener("change", atualizarCameraId);

// 📌 Fechar menu mobile ao clicar em link
document.querySelectorAll('nav ul li a').forEach(link => {
    link.addEventListener('click', function() {
        document.getElementById('menuToggle').classList.remove('active');
        document.querySelector('nav ul').classList.remove('active');
    });
});

// 📌 Menu hambúrguer
document.getElementById('menuToggle').addEventListener('click', function() {
    this.classList.toggle('active');
    document.querySelector('nav ul').classList.toggle('active');
});

// 📌 Salvar rascunho no localStorage
function salvarRascunho() {
    const dados = {
        unidade: document.getElementById('unidade').value,
        local: document.getElementById('local').value,
        cameraType: cameraType.value,
        dvrUnit: dvrUnit.value,
        dvrCamera: dvrCamera.value,
        domeUnit: domeUnit.value,
        responsavel: document.getElementById('responsavel').value,
        funcionando: funcionando.value,
        imagem: imagem.value,
        gravando: gravando.value,
        fixacao: document.getElementById('fixacao').value,
        cabeamento: document.getElementById('cabeamento').value,
        qualidade: document.getElementById('qualidade').value,
        dvr: document.getElementById('dvr').value,
        acao: document.getElementById('acao').value
    };
    localStorage.setItem('checklistRascunho', JSON.stringify(dados));
}

// 📌 Restaurar rascunho do localStorage
function restaurarRascunho() {
    const rascunho = localStorage.getItem('checklistRascunho');
    if (rascunho) {
        const dados = JSON.parse(rascunho);
        if (confirm('Deseja restaurar o formulário anterior?')) {
            document.getElementById('unidade').value = dados.unidade || '';
            document.getElementById('local').value = dados.local || '';
            cameraType.value = dados.cameraType || '';
            dvrUnit.value = dados.dvrUnit || '';
            dvrCamera.value = dados.dvrCamera || '';
            domeUnit.value = dados.domeUnit || '';
            document.getElementById('responsavel').value = dados.responsavel || '';
            funcionando.value = dados.funcionando || '';
            imagem.value = dados.imagem || '';
            gravando.value = dados.gravando || '';
            document.getElementById('fixacao').value = dados.fixacao || '';
            document.getElementById('cabeamento').value = dados.cabeamento || '';
            document.getElementById('qualidade').value = dados.qualidade || '';
            document.getElementById('dvr').value = dados.dvr || '';
            document.getElementById('acao').value = dados.acao || '';
            atualizarCameraSettings();
            avaliarChecklist();
        }
    }
}

// Salvar rascunho a cada mudança
const formInputs = document.querySelectorAll('#checklistForm input, #checklistForm select, #checklistForm textarea');
formInputs.forEach(input => {
    input.addEventListener('change', salvarRascunho);
});

function converterImagemBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}
// 📌 Enviar dados para Google Sheets via Apps Script
async function enviarParaPlanilha(dados) {

    const scriptURL = 'https://script.google.com/macros/s/AKfycbwUFUyUZOfjDs_PkJNNjP_qfzRtSyE038beyBcay5cdM_Myc7hDwEb8gPJz9JtL3Pkj/exec';

    try {
        const response = await fetch(scriptURL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dados)
        });

        const result = await response.json();

        if (result.status === "success") {
            console.log("✅ Enviado para planilha com sucesso!");
            return true;
        } else {
            throw new Error("Erro ao salvar na planilha: " + JSON.stringify(result));
        }

    } catch (error) {
        console.error("❌ Falha na comunicação com a planilha:", error);
        throw error; // Re-lançar para que o try/catch do event listener capture
    }
}

// 📌 Gerar PDF do relatório
async function gerarPDF(dados) {

    const conteudo = `
        <div style="font-family: Arial; padding:20px;">
            <h2>Relatório Checklist CFTV</h2>
            <p><strong>Unidade:</strong> ${dados.unidade}</p>
            <p><strong>Local:</strong> ${dados.local}</p>
            <p><strong>Câmera:</strong> ${dados.cameraId}</p>
            <p><strong>Responsável:</strong> ${dados.responsavel}</p>

            <hr>

            <p><strong>Funcionando:</strong> ${dados.funcionando}</p>
            <p><strong>Imagem:</strong> ${dados.imagem}</p>
            <p><strong>Gravando:</strong> ${dados.gravando}</p>

            <hr>

            <p><strong>Criticidade:</strong> ${dados.criticidade}</p>
            <p><strong>Ação:</strong> ${dados.acao}</p>

            ${dados.imagemBase64 ? `<img src="${dados.imagemBase64}" style="width:300px;margin-top:10px;">` : ""}
        </div>
    `;

    const element = document.createElement("div");
    element.innerHTML = conteudo;

    await html2pdf().from(element).save("relatorio_checklist.pdf");

    const options = {
        margin: 1,
        filename: `Checklist_CFTV_${dados.unidade.replace(/\//g, '_')}_${Date.now()}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    };

    const pdfBlob = await html2pdf().set(options).from(element).outputPdf('blob');
    document.body.removeChild(element);
    
    return pdfBlob;
}async function gerarPDF(dados) {

document.getElementById("checklistForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    // Feedback visual de carregamento
    const btn = this.querySelector("button");
    const originalText = btn.innerText;
    btn.innerText = "Enviando...";
    btn.disabled = true;

    try {
        let imagemBase64 = "";
        if (foto.files && foto.files.length > 0) {
            imagemBase64 = await converterImagemBase64(foto.files[0]);
        }

        // Montagem minuciosa seguindo sua lista de colunas
        const dados = {
            unidade: document.getElementById('unidade').value,
            local: document.getElementById('local').value,
            cameraId: document.getElementById('cameraId').value,
            responsavel: document.getElementById('responsavel').value,
            
            // Status do Check Rápido
            funcionando: document.getElementById('funcionando').value,
            imagem: document.getElementById('imagem').value,
            gravando: document.getElementById('gravando').value,
            criticidade: document.getElementById('criticidade').value,

            // Detalhamento Técnico (Mesmo se estiver display:none, pegamos o valor)
            fixacao: document.getElementById('fixacao').value || "N/A",
            cabeamento: document.getElementById('cabeamento').value || "N/A",
            qualidade: document.getElementById('qualidade').value || "N/A",
            dvr: document.getElementById('dvr').value || "N/A",
            
            acao: document.getElementById('acao').value,
            foto: imagemBase64 
        };

        console.log("📤 Enviando todos os dados para a planilha...");

        // Chamada da função com tratamento de CORS
        const sucesso = await enviarParaPlanilha(dados);

        if (sucesso) {
            alert("✅ Checklist enviado com sucesso!");
            localStorage.removeItem('checklistRascunho');
            this.reset();
            detalhado.style.display = "none";
            criticidade.value = "";
        }

    } catch (error) {
        console.error("ERRO DETALHADO:", error);
        alert("❌ Erro ao enviar checklist. Verifique o console.");
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
});

async function enviarParaPlanilha(dados) {
    // O seu link real extraído do meio do código:
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwUFUyUZOfjDs_PkJNNjP_qfzRtSyE038beyBcay5cdM_Myc7hDwEb8gPJz9JtL3Pkj/exec'; 

    try {
        await fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', // Modo necessário para Apps Script
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dados)
        });
        
        // No modo 'no-cors', se não der erro no fetch, consideramos sucesso.
        console.log("✅ Dados enviados!");
        return true; 
    } catch (error) {
        console.error("❌ Erro no Fetch:", error);
        throw error;
    }
}
