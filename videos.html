<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="src/img/kmd-16x16.png" type="image/png">
    <title>Galeria de Vídeos - PA-Campinas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('src/img/Registro%20de%20Saidas.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .header {
            color: rgb(247, 243, 243);
            padding: 10px 0;
            text-align: center;
            position: fixed;
            width: 100%;
            top: 50px;
            z-index: 1000;
        }
            
        nav {
            display: flex;
            justify-content: center;
            background-color: #444;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
            
        nav ul { list-style: none; padding: 0; margin: 0; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        nav ul li a { color: rgb(252, 254, 255); text-decoration: none; font-size: 14px; font-weight: 500; padding: 10px 20px; border-radius: 25px; transition: 0.3s; }
        nav ul li a:hover { background-color: rgba(23, 23, 175, 0.6); }

        .content {
            padding: 120px 20px;
            text-align: center;
        }
        
        .video-container {
            display: flex; /* Coloca os ícones lado a lado */
            justify-content: center; /* Centraliza os ícones */
            gap: 20px; /* Adiciona um espaçamento entre os ícones */
            padding: 20px;
        }

        .video-item {
            position: relative;
            display: inline-block;
        }

        .video-icon {
            width: 50px;  /* Ajuste o tamanho conforme necessário */
            height: auto; /* Mantém a proporção original */
            cursor: pointer; /* Indica que é clicável */
            transition: 0.3s ease; /* Transição suave para o efeito hover */
        }

        .video-icon:hover {
            filter: brightness(1.5); /* Aumenta o brilho do ícone ao passar o mouse */
        }

        .video-title {
            display: none;
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px;
            border-radius: 5px;
            font-size: 14px;
        }

        .video-item:hover .video-title {
            display: block;
        }

        footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.9em;
            color: #f9f6f6;
            padding: 10px 0;
            background-color: transparent;
            border-top: 1px solid gray;
            box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.1);
        }
        /* Menu Hambúrguer */
.menu-toggle {
    display: none;
    flex-direction: column;
    background: none;
    border: none;
    cursor: pointer;
    padding: 10px 15px;
    gap: 5px;
    z-index: 1001;
}

.menu-toggle span {
    width: 25px;
    height: 3px;
    background-color: #ffffff;
    border-radius: 3px;
    transition: 0.3s ease;
}

.menu-toggle.active span:nth-child(1) {
    transform: rotate(45deg) translate(8px, 8px);
}

.menu-toggle.active span:nth-child(2) {
    opacity: 0;
}

.menu-toggle.active span:nth-child(3) {
    transform: rotate(-45deg) translate(7px, -7px);
}

@media (max-width: 768px) {
    .menu-toggle {
        display: flex;
        position: fixed;
        right: 15px;
        top: 15px;
    }

    nav ul {
        flex-direction: column;
        position: fixed;
        top: 60px;
        left: 0;
        right: 0;
        background-color: rgba(20, 20, 20, 0.98);
        gap: 0;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
        justify-content: flex-start;
        padding: 0 !important;
        border-radius: 0;
        box-shadow: inset 0 2px 15px rgba(0, 0, 0, 0.5);
    }

    nav ul.active {
        max-height: 500px;
        padding: 15px 0 !important;
    }

    nav ul li {
        width: 100%;
        text-align: center;
    }

    nav ul li a {
        display: block;
        border-radius: 0;
        padding: 15px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    nav ul li:hover {
        background-color: rgba(23, 23, 175, 0.6);
    }

    nav ul li:last-child a {
        border-bottom: none;
    }
}
    </style>

    <script>
        function abrirVideo(url) {
            window.open(url, "_blank", "width=800,height=450");
        }
    </script>
</head>
<body>
    <button class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="registro-saidas.html">Registro de Saídas</a></li>
            <li><a href="solicitacao-escolta.html">Solicitação de Escolta</a></li>
            <li><a href="conhecimento.html">Para conhecimento</a></li>
            <li><a href="convite.html">Convite Motorista</a></li>
            <li><a href="videos.html">Galeria de Vídeos</a></li>
            <li><a href="brief.html">Briefing</a></li>
            <li><a href="posicao.html">Posição escolta</a></li>
            <li><a href="comunicado.html">Comunicado</a></li>
        </ul>
    </nav>

    <div class="content">
        <h1>Galeria de Vídeos</h1>
        <div class="video-container">
            <!-- Cada ícone com seu respectivo link de vídeo -->
            <div class="video-item">
                <img src="src/img/Movie_Kmd.png" alt="Dica KMD Move" class="video-icon" onclick="abrirVideo('src/video/Dica_Kmd_Move.mp4')">
                <div class="video-title">Dica KMD Move</div>
            </div>
           
            <div class="video-item">
                <img src="src/img/Movie_Kmd.png" alt="Outro" class="video-icon" onclick="abrirVideo('src/video/Outro_Video.mp4')">
                <div class="video-title">Outro Vídeo</div>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2025 PA-Campinas - Todos os direitos reservados.
    </footer>

    <script>
        function abrirVideo(url) {
            window.open(url, '_blank', 'width=800,height=450');
        }

        // Menu Hambúrguer - Responsivo
        document.addEventListener('DOMContentLoaded', function() {
            const menuToggle = document.getElementById('menuToggle');
            const navMenu = document.querySelector('nav ul');

            if (menuToggle) {
                menuToggle.addEventListener('click', function() {
                    menuToggle.classList.toggle('active');
                    navMenu.classList.toggle('active');
                });

                // Fecha o menu ao clicar em um link
                const navLinks = document.querySelectorAll('nav ul li a');
                navLinks.forEach(link => {
                    link.addEventListener('click', function() {
                        menuToggle.classList.remove('active');
                        navMenu.classList.remove('active');
                    });
                });

                // Fecha o menu ao clicar fora
                document.addEventListener('click', function(event) {
                    const isClickInsideNav = navMenu.contains(event.target);
                    const isClickOnToggle = menuToggle.contains(event.target);
                    
                    if (!isClickInsideNav && !isClickOnToggle && navMenu.classList.contains('active')) {
                        menuToggle.classList.remove('active');
                        navMenu.classList.remove('active');
                    }
                });
            }
        });
    </script>
</body>
</html>
